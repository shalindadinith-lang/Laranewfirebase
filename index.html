<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LARA Admin Panel</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💄</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:#0a0a0a;color:#ddd;min-height:100vh;padding:20px}
        .container{max-width:1100px;margin:0 auto}
        h1{text-align:center;font-family:'Playfair Display',serif;color:#ccc;margin-bottom:25px;font-size:2.2rem}
        .login-box{background:#1a1a1a;padding:35px;border-radius:20px;border:1px solid #333;max-width:420px;margin:80px auto;text-align:center}
        .login-box h2{color:#aaa;margin-bottom:20px}
        .login-box input{width:100%;padding:12px 15px;margin:10px 0;border:1px solid #555;border-radius:10px;background:#0a0a0a;color:#fff;font-size:1rem;outline:none}
        .login-box input:focus{border-color:#888}
        .admin-panel{display:none}
        .admin-panel.active{display:block}
        .top-bar{background:#1a1a1a;padding:15px 25px;border-radius:15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;border:1px solid #333;flex-wrap:wrap;gap:10px}
        .welcome{font-weight:600;color:#bbb}
        .form-card{background:#1a1a1a;border:1px solid #333;border-radius:18px;padding:25px;margin-bottom:25px}
        .form-card h3{color:#ccc;margin-bottom:15px;font-size:1.3rem}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;font-weight:600;margin-bottom:5px;color:#aaa;font-size:0.9rem}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 15px;border:1px solid #444;border-radius:10px;background:#0a0a0a;color:#fff;font-size:0.95rem;outline:none;font-family:'Poppins',sans-serif}
        .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#888}
        .form-group textarea{height:90px;resize:vertical}
        .colour-section{border:1px solid #333;border-radius:16px;padding:20px;background:#111;margin-bottom:15px}
        .colour-section h4{color:#ccc;margin-bottom:15px}
        .colour-add-area{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:15px}
        .color-picker-btn{width:50px;height:50px;border-radius:14px;border:2px solid #555;cursor:pointer;position:relative;overflow:hidden}
        .color-picker-btn input[type="color"]{position:absolute;top:-10px;left:-10px;width:70px;height:70px;opacity:0;cursor:pointer}
        .colour-name-input,.colour-hex-input{padding:12px 15px;border:1px solid #555;border-radius:12px;background:#0a0a0a;color:#fff;outline:none;font-size:0.95rem}
        .colour-name-input:focus,.colour-hex-input:focus{border-color:#888}
        .colour-preview{width:40px;height:40px;border-radius:10px;border:2px solid #555}
        .add-colour-btn{padding:12px 20px;background:#444;border:none;border-radius:12px;cursor:pointer;font-weight:700;color:#fff;transition:0.2s}
        .preset-colors{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px}
        .preset-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:0.2s}
        .preset-swatch:hover{transform:scale(1.2);border-color:#888}
        .preset-swatch.selected{border-color:#aaa;box-shadow:0 0 10px rgba(255,255,255,0.3)}
        .colour-tag-container{display:flex;flex-wrap:wrap;gap:8px;min-height:40px;padding:10px;background:#0a0a0a;border-radius:12px;border:1px dashed #555}
        .colour-tag{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:25px;background:#1a1a1a;border:1px solid #444;font-size:0.9rem;color:#ddd}
        .colour-tag .color-dot{width:22px;height:22px;border-radius:50%}
        .colour-tag .remove-colour{cursor:pointer;color:#ff4444;font-weight:bold}
        button{cursor:pointer;border:none;border-radius:10px;padding:10px 20px;font-weight:600;transition:0.2s;display:inline-flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif}
        .btn-primary{background:#444;color:#fff}
        .btn-secondary{background:#333;color:#fff}
        .btn-danger{background:#ff4444;color:#fff}
        .btn-small{padding:6px 12px;font-size:0.8rem}
        .product-list{margin-top:10px}
        .product-item{background:#111;padding:15px 20px;border-radius:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border:1px solid #333}
        .product-item:hover{border-color:#777}
        .product-item img{width:70px;height:70px;object-fit:cover;border-radius:10px}
        .mini-colour-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:15px;background:#222;border:1px solid #444;font-size:0.75rem}
        .mini-dot{width:12px;height:12px;border-radius:50%}
        .hidden{display:none!important}
        @media(max-width:768px){.form-row{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">
    <h1>🖤 LARA Admin Panel</h1>
    <div class="login-box" id="loginBox">
        <h2><i class="fas fa-lock"></i> Admin Login</h2>
        <input type="email" id="loginEmail" placeholder="Admin Email" />
        <input type="password" id="loginPassword" placeholder="Password" />
        <button class="btn-primary" onclick="login()" style="width:100%;justify-content:center;"><i class="fas fa-sign-in-alt"></i> Login</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="top-bar">
            <span class="welcome"><i class="fas fa-user-circle"></i> Welcome, <span id="adminEmail">Admin</span></span>
            <button class="btn-secondary" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="form-card">
            <h3 id="formTitle"><i class="fas fa-plus-circle"></i> Add New Product</h3>
            <input type="hidden" id="editProductId" />
            <div class="form-row">
                <div class="form-group"><label>Product Name *</label><input type="text" id="productName" placeholder="e.g., Matte Lipstick" /></div>
                <div class="form-group"><label>Category *</label><select id="productCategory"><option value="">Select</option><option value="Lipstick">Lipstick</option><option value="Skincare">Skincare</option><option value="Makeup">Makeup</option><option value="Perfume">Perfume</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Price (Rs.) *</label><input type="number" id="productPrice" step="0.01" /></div>
                <div class="form-group"><label>Image URL</label><input type="url" id="productImage" /></div>
            </div>

            <div class="colour-section">
                <h4><i class="fas fa-palette"></i> Product Colours</h4>
                <div class="preset-colors">
                    <div class="preset-swatch" style="background:#FF0000;" onclick="selectPreset('#FF0000','Red')"></div>
                    <div class="preset-swatch" style="background:#000000;" onclick="selectPreset('#000000','Black')"></div>
                    <div class="preset-swatch" style="background:#FFFFFF;border:1px solid #555;" onclick="selectPreset('#FFFFFF','White')"></div>
                </div>
                <div class="colour-add-area">
                    <div class="color-picker-btn" id="colorPickerPreview" style="background:#888;"><input type="color" id="colorPicker" value="#888888" onchange="onColorPickerChange()" /></div>
                    <input type="text" class="colour-name-input" id="colourNameInput" placeholder="Colour name" />
                    <input type="text" class="colour-hex-input" id="colourHexInput" placeholder="#888888" maxlength="7" oninput="onHexInputChange()" />
                    <div class="colour-preview" id="colourPreview" style="background:#888;"></div>
                    <button class="add-colour-btn" onclick="addColour()"><i class="fas fa-plus"></i> Add</button>
                </div>
                <div class="colour-tag-container" id="colourTags"></div>
            </div>

            <div class="form-group"><label>Description</label><textarea id="productDescription"></textarea></div>
            <div style="display:flex;gap:10px;margin-top:10px;">
                <button class="btn-primary" onclick="saveProduct()"><i class="fas fa-save"></i> <span id="saveBtnText">Save Product</span></button>
                <button class="btn-secondary hidden" id="cancelEditBtn" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel</button>
            </div>
        </div>

        <div class="form-card">
            <h3><i class="fas fa-list"></i> Product List (<span id="productCount">0</span>)</h3>
            <div class="product-list" id="productList"><p style="color:#888;">Loading...</p></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig={apiKey:"AIzaSyAOqKpGbesbgeAfA2J_QGfomjTiY_FIfnA",authDomain:"lara-f5aed.firebaseapp.com",projectId:"lara-f5aed",storageBucket:"lara-f5aed.firebasestorage.app",messagingSenderId:"942336215471",appId:"1:942336215471:web:7971423ac9d4cff776075a"};
    firebase.initializeApp(firebaseConfig);
    const db=firebase.firestore(),auth=firebase.auth();

    let editingProductId=null,currentColours=[];

    window.onColorPickerChange=()=>{const hex=document.getElementById('colorPicker').value.toUpperCase();document.getElementById('colourHexInput').value=hex;document.getElementById('colourPreview').style.background=hex;document.getElementById('colorPickerPreview').style.background=hex;};
    window.onHexInputChange=()=>{const hexInput=document.getElementById('colourHexInput');let hex=hexInput.value.toUpperCase();if(hex&&!hex.startsWith('#')){hex='#'+hex;hexInput.value=hex;}if(/^#[0-9A-F]{6}$/.test(hex)){document.getElementById('colorPicker').value=hex;document.getElementById('colourPreview').style.background=hex;document.getElementById('colorPickerPreview').style.background=hex;}};
    window.selectPreset=(hex,name)=>{document.getElementById('colorPicker').value=hex;document.getElementById('colourHexInput').value=hex;document.getElementById('colourNameInput').value=name;document.getElementById('colourPreview').style.background=hex;document.getElementById('colorPickerPreview').style.background=hex;};
    window.addColour=()=>{const name=document.getElementById('colourNameInput').value.trim();let hex=document.getElementById('colourHexInput').value.trim().toUpperCase();if(!name||!hex||!/^#[0-9A-F]{6}$/.test(hex))return alert('Enter valid name and hex');if(currentColours.some(c=>c.name===name&&c.hex===hex))return alert('Already exists');currentColours.push({name,hex});renderColourTags();document.getElementById('colourNameInput').value='';document.getElementById('colourHexInput').value='#888888';document.getElementById('colourNameInput').focus();};
    window.removeColour=(i)=>{currentColours.splice(i,1);renderColourTags();};
    function renderColourTags(){document.getElementById('colourTags').innerHTML=currentColours.map((c,i)=>`<span class="colour-tag"><span class="color-dot" style="background:${c.hex};"></span>${c.name} <small style="color:#888;">${c.hex}</small> <span class="remove-colour" onclick="removeColour(${i})">×</span></span>`).join('');}

    window.login=async()=>{const email=document.getElementById('loginEmail').value.trim(),password=document.getElementById('loginPassword').value;if(!email||!password)return alert('Enter credentials');try{await auth.signInWithEmailAndPassword(email,password)}catch(e){alert('Login failed: '+e.message)}};
    window.logout=()=>auth.signOut();
    auth.onAuthStateChanged(user=>{if(user){document.getElementById('loginBox').classList.add('hidden');document.getElementById('adminPanel').classList.add('active');document.getElementById('adminEmail').textContent=user.email;loadProducts();}else{document.getElementById('loginBox').classList.remove('hidden');document.getElementById('adminPanel').classList.remove('active');}});

    async function loadProducts(){
        const list=document.getElementById('productList');list.innerHTML='<p style="color:#888;">Loading...</p>';
        const snap=await db.collection('products').orderBy('createdAt','desc').get();const prods=[];snap.forEach(d=>prods.push({id:d.id,...d.data()}));
        document.getElementById('productCount').textContent=prods.length;
        list.innerHTML=prods.map(p=>`<div class="product-item"><img src="${p.image||'https://via.placeholder.com/70'}" onerror="this.src='https://via.placeholder.com/70'" /><div style="flex:1;"><strong>${p.name}</strong><small style="display:block;">${p.category||'N/A'} | Rs. ${(p.price||0).toLocaleString()}</small><div>${(p.colours||[]).map(c=>`<span class="mini-colour-tag"><span class="mini-dot" style="background:${typeof c==='object'?c.hex:'#ccc'};"></span>${typeof c==='object'?c.name:c}</span>`).join('')}</div></div><div style="display:flex;gap:8px;"><button class="btn-secondary btn-small" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button><button class="btn-danger btn-small" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button></div></div>`).join('');
    }

    window.saveProduct=async()=>{
        const name=document.getElementById('productName').value.trim(),cat=document.getElementById('productCategory').value,price=parseFloat(document.getElementById('productPrice').value),img=document.getElementById('productImage').value.trim(),desc=document.getElementById('productDescription').value.trim();
        if(!name||!cat||!price)return alert('Fill required fields');
        const data={name,category:cat,price,image:img||'https://via.placeholder.com/300x220/1a1a1a/fff?text=No+Image',colours:[...currentColours],description:desc,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
        if(editingProductId){await db.collection('products').doc(editingProductId).update(data);alert('Updated!');}else{data.createdAt=firebase.firestore.FieldValue.serverTimestamp();await db.collection('products').add(data);alert('Added!');}
        resetForm();loadProducts();
    };
    window.editProduct=async(id)=>{const doc=await db.collection('products').doc(id).get();const p=doc.data();editingProductId=id;document.getElementById('editProductId').value=id;document.getElementById('productName').value=p.name;document.getElementById('productCategory').value=p.category;document.getElementById('productPrice').value=p.price;document.getElementById('productImage').value=p.image||'';document.getElementById('productDescription').value=p.description||'';currentColours=(p.colours||[]).map(c=>typeof c==='object'?{name:c.name,hex:c.hex}:{name:String(c),hex:'#000000'});renderColourTags();document.getElementById('formTitle').innerHTML='<i class="fas fa-edit"></i> Edit Product';document.getElementById('saveBtnText').textContent='Update Product';document.getElementById('cancelEditBtn').classList.remove('hidden');};
    window.deleteProduct=async(id)=>{if(confirm('Delete?')){await db.collection('products').doc(id).delete();if(editingProductId===id)resetForm();loadProducts();}};
    window.cancelEdit=()=>resetForm();
    function resetForm(){editingProductId=null;document.getElementById('editProductId').value='';document.getElementById('productName').value='';document.getElementById('productCategory').value='';document.getElementById('productPrice').value='';document.getElementById('productImage').value='';document.getElementById('productDescription').value='';currentColours=[];renderColourTags();document.getElementById('formTitle').innerHTML='<i class="fas fa-plus-circle"></i> Add New Product';document.getElementById('saveBtnText').textContent='Save Product';document.getElementById('cancelEditBtn').classList.add('hidden');}
</script>
</body>
</html>
